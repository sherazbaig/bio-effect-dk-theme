# Production
- pipeline: "Production"
  on: "CLICK"
  refs:
  - "refs/heads/master"
  priority: "NORMAL"
  fail_on_prepare_env_warning: true
  variables:
  - key: "BUGSNAG_API_KEY"
    value: "5b7a170684b4bf0037ce805bbd7976e6"
    type: "VAR"
    description: "API key for Bugsnag integration"
  - key: "RELEASE_VERSION"
    value: "$BUDDY_EXECUTION_ID"
