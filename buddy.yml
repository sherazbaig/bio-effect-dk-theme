# Buddy Pipelines setup
# You must replace the following:
# - PROJECT_BUDDY_HANDLE - URL handle of project on Buddy.
# - SHOPIFY_INTEGRATION_HASH - Buddy Shopify integration ID.
# - DEVELOPMENT_THEME_ID - Theme ID for `DEVELOPMENT` theme.
# - DEVELOPMENT_STORYBOOK_THEME_ID - Theme ID for `DEVELOPMENT - Storybook` theme.
# - STAGING_THEME_ID - Theme ID for `STAGING` theme.
# - PRODUCTION_THEME_ID - Theme ID for `PRODUCTION` theme.
# - PRODUCTION_STORYBOOK_THEME_ID - Theme ID for `PRODUCTION - Storybook` theme.
# - BUGSNAG_API_KEY_VALUE - Bugsnag API key for project.

# Development
- pipeline: "Development"
  on: "EVENT"
  events:
  - type: "PUSH"
    refs:
    - "refs/heads/development"
  priority: "NORMAL"
  fail_on_prepare_env_warning: true
  actions:
  - action: "Build"
    type: "BUILD"
    working_directory: "/buddy/bio-effect"
    main_service_name: "Main"
    docker_image_name: "library/node"
    docker_image_tag: "16.17.0"
    execute_commands:
    - "yarn && yarn build --debug"
    volume_mappings:
    - "/:/buddy/bio-effect"
    cache_base_image: true
    shell: "BASH"
  - action: "Deploy to DEVELOPMENT theme EU Store"
    type: "SHOPIFY"
    input_type: "BUILD_ARTIFACTS"
    local_path: "/dist/"
    theme: "152613486902"
    theme_name: "DEVELOPMENT"
    deployment_excludes:
    - "node_modules/"
    - "/assets/*.otf"
    - "/assets/component.*-vue.css"
    - "/assets/component.*-vue.js"
    - "/config/settings_data.json"
    - "/sections/*.json"
    - "/templates/customers/*.json"
    - "/templates/*.json"
    - "/locales/"
    integration_hash: "3qM15wNJAPdRkN8VeGyOXpZKnW"
  - action: "Deploy to DEVELOPMENT theme DK Store"
    type: "SHOPIFY"
    input_type: "BUILD_ARTIFACTS"
    local_path: "/dist/"
    theme: "165940625734"
    theme_name: "DEVELOPMENT"
    deployment_excludes:
    - "node_modules/"
    - "/assets/*.otf"
    - "/assets/component.*-vue.css"
    - "/assets/component.*-vue.js"
    - "/config/settings_data.json"
    - "/sections/*.json"
    - "/templates/customers/*.json"
    - "/templates/*.json"
    - "/locales/"
    integration_hash: "BioEffect_DK"
  - action: "Deploy to DEVELOPMENT theme example-bioeffect store"
    type: "SHOPIFY"
    input_type: "BUILD_ARTIFACTS"
    local_path: "/dist/"
    theme: "137057435736"
